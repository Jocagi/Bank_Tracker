{% extends 'base.html' %}
{% block title %}Usuarios{% endblock %}
{% block content %}
<h1>Usuarios</h1>
<div class="mb-2">
  <a href="{{ url_for('main.add_user') }}" class="btn btn-primary">Agregar Usuario</a>
</div>
<div class="table-container">
  <div class="table-wrapper">
    <table class="table table-hover mb-0" id="users-table">
  <thead>
    <tr><th data-column="usuario">Usuario <span class="sort-indicator" data-column="usuario"></span></th><th data-column="rol">Rol <span class="sort-indicator" data-column="rol"></span></th><th>Acciones</th></tr>
  </thead>
  <tbody>
    {% for u in users %}
    <tr data-usuario="{{ u.username.lower() }}" data-rol="{{ u.role.lower() }}">
      <td>{{ u.username }}</td>
      <td>{{ u.role }}</td>
      <td>
        <a href="{{ url_for('main.edit_user', user_id=u.id) }}" class="btn btn-sm btn-secondary">Editar</a>
        <form method="post" action="{{ url_for('main.delete_user', user_id=u.id) }}" style="display:inline" onsubmit="return confirm('Eliminar usuario?');">
          <button class="btn btn-sm btn-danger">Eliminar</button>
        </form>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
  </div>
</div>
{% endblock %}
